name: CI

on:
    pull_request:
        branches:
            - main
    workflow_dispatch:

permissions:
    contents: read

jobs:
    check:
        name: Check
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Run checks
              run: bun run check

            - name: Build extension
              run: bun run build

            - name: Package extension
              run: bun run package

            - name: Upload VSIX artifact
              uses: actions/upload-artifact@v4
              with:
                  name: mk-coding-extension-vsix
                  path: build/*.vsix
                  if-no-files-found: error
                  retention-days: 7
