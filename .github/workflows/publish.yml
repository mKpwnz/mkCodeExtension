name: Publish Marketplace

on:
    push:
        branches:
            - main
        paths:
            - package.json
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: marketplace-publish
    cancel-in-progress: false

jobs:
    detect-release:
        name: Detect Release
        runs-on: ubuntu-latest
        outputs:
            tag: ${{ steps.release.outputs.tag }}

        steps:
            - name: Checkout
              uses: actions/checkout@main
              with:
                  fetch-depth: 0

            - name: Setup Bun
              uses: oven-sh/setup-bun@main
              with:
                  bun-version: latest

            - name: Detect merged release tag
              id: release
              run: |
                  BEFORE_SHA="${{ github.event.before }}"
                  AFTER_SHA="${{ github.sha }}"

                  if [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$BEFORE_SHA^{commit}" 2>/dev/null; then
                      echo "No previous main commit is available for release detection"
                      exit 0
                  fi

                  BEFORE_VERSION="$(git show "$BEFORE_SHA:package.json" | bun -p "JSON.parse(await Bun.stdin.text()).version")"
                  AFTER_VERSION="$(git show "$AFTER_SHA:package.json" | bun -p "JSON.parse(await Bun.stdin.text()).version")"

                  if [ "$BEFORE_VERSION" = "$AFTER_VERSION" ]; then
                      echo "package.json version did not change in this push"
                      exit 0
                  fi

                  RELEASE_TAG="v$AFTER_VERSION"

                  if ! git rev-parse -q --verify "refs/tags/$RELEASE_TAG" >/dev/null; then
                      echo "Expected release tag $RELEASE_TAG was not found"
                      exit 0
                  fi

                  if ! git merge-base --is-ancestor "$RELEASE_TAG" "$AFTER_SHA"; then
                      echo "Release tag $RELEASE_TAG is not reachable from main"
                      exit 0
                  fi

                  echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

    publish:
        name: Publish VS Code Marketplace
        runs-on: ubuntu-latest
        needs: detect-release
        if: needs.detect-release.outputs.tag != ''
        environment: marketplace

        steps:
            - name: Checkout
              uses: actions/checkout@main
              with:
                  fetch-depth: 0

            - name: Setup Bun
              uses: oven-sh/setup-bun@main
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Verify release tag matches package version
              run: |
                  PACKAGE_VERSION="$(bun -p "require('./package.json').version")"
                  RELEASE_TAG="${{ needs.detect-release.outputs.tag }}"
                  TAG_VERSION="${RELEASE_TAG#v}"

                  if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
                      echo "Tag $RELEASE_TAG does not match package.json version $PACKAGE_VERSION"
                      exit 1
                  fi

            - name: Run checks
              run: bun run check

            - name: Build extension
              run: bun run build

            - name: Package extension
              run: bun run package

            - name: Publish packaged VSIX
              env:
                  VSCE_PAT: ${{ secrets.VSCE_PAT }}
              run: bunx @vscode/vsce publish --packagePath build/*.vsix --pat "$VSCE_PAT"
