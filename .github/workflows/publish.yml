name: Publish Marketplace

on:
    push:
        tags:
            - "v*.*.*"
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: marketplace-publish
    cancel-in-progress: false

jobs:
    publish:
        name: Publish VS Code Marketplace
        runs-on: ubuntu-latest
        environment: marketplace

        steps:
            - name: Checkout
              uses: actions/checkout@main
              with:
                  fetch-depth: 0

            - name: Setup Bun
              uses: oven-sh/setup-bun@main
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Verify release tag matches package version
              run: |
                  PACKAGE_VERSION="$(bun -p "require('./package.json').version")"
                  RELEASE_TAG="${GITHUB_REF_NAME}"
                  TAG_VERSION="${RELEASE_TAG#v}"

                  if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
                      echo "Tag $RELEASE_TAG does not match package.json version $PACKAGE_VERSION"
                      exit 1
                  fi

            - name: Run checks
              run: bun run check

            - name: Build extension
              run: bun run build

            - name: Package extension
              run: bun run package

            - name: Publish packaged VSIX
              env:
                  VSCE_PAT: ${{ secrets.VSCE_PAT }}
              run: bunx @vscode/vsce publish --packagePath build/*.vsix --pat "$VSCE_PAT"
