name: Publish Marketplace

on:
    push:
        branches:
            - main
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: marketplace-publish
    cancel-in-progress: false

jobs:
    publish:
        name: Publish VS Code Marketplace
        runs-on: ubuntu-latest
        environment: marketplace

        steps:
            - name: Checkout
              uses: actions/checkout@main

            - name: Setup Bun
              uses: oven-sh/setup-bun@main
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Run checks
              run: bun run check

            - name: Build extension
              run: bun run build

            - name: Package extension
              run: bun run package

            - name: Publish packaged VSIX
              env:
                  VSCE_PAT: ${{ secrets.VSCE_PAT }}
              run: bunx @vscode/vsce publish --packagePath build/*.vsix --pat "$VSCE_PAT"
